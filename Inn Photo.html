<style>
  :root {
    --bg: #0e0b09;
    --bg-elev: #15110e;
    --bg-soft: #1c1714;
    --fg: #f2ece3;
    --fg-dim: #b8ada0;
    --fg-muted: #7a6f63;
    --rule: #2a211c;
    --accent: #c68a5a; /* warm copper */
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
    --sans: 'Inter Tight', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
  body {
    font-family: var(--sans);
    font-weight: 300;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--accent); color: var(--bg); }
  img { display: block; max-width: 100%; }

  /* Film grain overlay */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: .04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.9'/></svg>");
  }
</style>
